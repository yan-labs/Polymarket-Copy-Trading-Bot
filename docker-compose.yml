version: '3.8'

services:
  # Bot Service
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poly-copybot
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - RPC_URL=${RPC_URL}
      - CLOB_HTTP_URL=${CLOB_HTTP_URL:-https://clob.polymarket.com/}
      - CLOB_WS_URL=${CLOB_WS_URL:-wss://ws-subscriptions-clob.polymarket.com/ws}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      - mongodb
    networks:
      - poly-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # MongoDB (optional - use Atlas in production)
  mongodb:
    image: mongo:7.0
    container_name: poly-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    networks:
      - poly-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Web Dashboard (deploy separately on Vercel/Render)
  # This is for local development/testing only
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.web
    container_name: poly-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - MONGODB_URI=${MONGO_URI}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    depends_on:
      - mongodb
    networks:
      - poly-network

networks:
  poly-network:
    driver: bridge

volumes:
  mongodb_data: